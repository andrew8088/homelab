apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthfolio
  namespace: wealthfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wealthfolio
  template:
    metadata:
      labels:
        app: wealthfolio
    spec:
      serviceAccountName: tailscale
      containers:
      - name: wealthfolio
        image: afadil/wealthfolio:latest
        ports:
        - containerPort: 8088
        env:
        - name: WF_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: wealthfolio-secrets
              key: WF_SECRET_KEY
        - name: WF_AUTH_PASSWORD_HASH
          valueFrom:
            secretKeyRef:
              name: wealthfolio-secrets
              key: WF_AUTH_PASSWORD_HASH
        - name: WF_LISTEN_ADDR
          value: "0.0.0.0:8088"
        - name: WF_DB_PATH
          value: "/data/wealthfolio.db"
        volumeMounts:
        - name: app-data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8088
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_HOSTNAME
          value: "wealthfolio"
        - name: TS_SERVE_CONFIG
          value: "/config/serve.json"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_KUBE_SECRET
          value: "tailscale-state"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        volumeMounts:
        - name: serve-config
          mountPath: /config
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: app-data
        hostPath:
          path: /mnt/primary/k3s-storage/wealthfolio-data
          type: DirectoryOrCreate
      - name: serve-config
        configMap:
          name: tailscale-serve-config
