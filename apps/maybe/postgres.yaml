apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: maybe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_USER
          value: "maybe_user"
        - name: POSTGRES_DB
          value: "maybe_production"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maybe-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_SHARED_BUFFERS
          value: "256MB"
        - name: POSTGRES_EFFECTIVE_CACHE_SIZE
          value: "768MB"
        - name: POSTGRES_WORK_MEM
          value: "16MB"
        - name: POSTGRES_MAINTENANCE_WORK_MEM
          value: "64MB"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - maybe_user
            - -d
            - maybe_production
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - maybe_user
            - -d
            - maybe_production
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-data
        hostPath:
          path: /mnt/primary/k3s-storage/maybe-postgres
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: maybe
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
