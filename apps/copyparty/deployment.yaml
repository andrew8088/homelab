apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyparty
  namespace: copyparty
  labels:
    app: copyparty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: copyparty
  template:
    metadata:
      labels:
        app: copyparty
    spec:
      containers:
      - name: copyparty
        image: copyparty/ac:latest
        args:
        - "-a"
        - "andrew:$(COPYPARTY_PASSWORD)"
        - "--log-badxml"
        ports:
        - containerPort: 3923
          name: http
        volumeMounts:
        - name: files
          mountPath: /w
        - name: audiobooks
          mountPath: /audiobooks
        - name: config
          mountPath: /cfg
        - name: copyparty-config
          mountPath: /cfg/config.conf
          subPath: config.conf
          readOnly: true
        env:
        - name: COPYPARTY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: copyparty-secrets
              key: password
        - name: LD_PRELOAD
          value: "/usr/lib/libmimalloc-secure.so.2"
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "3Gi"
            cpu: "400m"
        livenessProbe:
          httpGet:
            path: /
            port: 3923
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3923
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      volumes:
      - name: files
        hostPath:
          path: /mnt/primary/k3s-storage/files
          type: Directory
      - name: audiobooks
        hostPath:
          path: /mnt/primary/k3s-storage/audiobooks
          type: Directory
      - name: config
        hostPath:
          path: /mnt/primary/k3s-storage/copyparty-config
          type: Directory
      - name: copyparty-config
        configMap:
          name: copyparty-config
